name: CI

on:
  push:
    branches: [ "main", "develop", "claude/**" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    name: Build, Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Lint Google TV (debug)
        run: ./gradlew lintGoogletvDebug --stacktrace

      - name: Lint Fire TV (debug)
        run: ./gradlew lintFiretvDebug --stacktrace

      - name: Build Google TV (debug)
        run: ./gradlew assembleGoogletvDebug --stacktrace

      - name: Build Fire TV (debug)
        run: ./gradlew assembleFiretvDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew :app:testGoogletvDebugUnitTest :app:testFiretvDebugUnitTest --stacktrace

      - name: Upload build reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-reports
          path: app/build/reports/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apks
          path: |
            app/build/outputs/apk/googletv/debug/app-googletv-debug.apk
            app/build/outputs/apk/firetv/debug/app-firetv-debug.apk
          retention-days: 7
